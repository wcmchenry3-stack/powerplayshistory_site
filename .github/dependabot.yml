version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Denver
    open-pull-requests-limit: 10
    target-branch: dev
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Denver
    target-branch: dev
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
